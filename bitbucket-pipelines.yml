#            - mkdir -p $HOME/.m2/repository/it/nordcom/utility/1.0.0-SNAPSHOT
#            - cp common-library/utility/target/utility-1.0.0-SNAPSHOT.jar $HOME/.m2/repository/it/nordcom/utility/1.0.0-SNAPSHOT/utility-1.0.0-SNAPSHOT.jar
#            - cp common-library/utility/pom.xml $HOME/.m2/repository/it/nordcom/utility/1.0.0-SNAPSHOT/utility-1.0.0-SNAPSHOT.pom
#            - mvn clean install -DskipTests
        artifacts:
            - target/*.jar
    - step: &docker
        name: docker
        caches:
            - docker
        script:
            - export DEPLOY_ENV=$BITBUCKET_BRANCH
            - export IMAGE_TAG=$(date +%Y%m%d%H%M%S)
            - docker build -t $DOCKER_REPOSITORY/configserver-qt-$DEPLOY_ENV-1.0.0-snapshot:$IMAGE_TAG .
            - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD $DOCKER_REPOSITORY
            - docker push $DOCKER_REPOSITORY/configserver-qt-$DEPLOY_ENV-1.0.0-snapshot:$IMAGE_TAG
        services:
            - docker
    - step: &jar
        name: download jar
        script:
            - export DEPLOY_ENV=$BITBUCKET_BRANCH
            - apk update && apk add git
            - git clone --single-branch --branch $DEPLOY_ENV https://x-token-auth:$BITBUCKET_TOKEN@bitbucket.org/nordc/common-library.git
            - cd common-library
            - mvn clean install -DskipTests
        artifacts:
#            - common-library/pom.xml
#            - common-library/common/target/*.jar
#            - common-library/common/pom.xml
#            - common-library/logger/target/*.jar
#            - common-library/logger/pom.xml
#            - common-library/turni-cloner/target/*.jar
#            - common-library/turni-cloner/pom.xml
#            - common-library/utility/target/*.jar
#            - common-library/utility/pom.xml
pipelines:
    pull-request:
        '**':
            - step: *build
    branches:
        main:
            - step: *build
            - step: *docker
        develop:
            - step: *jar
            - step: *build
            - step: *docker
        staging:
            - step: *jar
            - step: *build
            - step: *docker