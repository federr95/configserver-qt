#            - mkdir -p $HOME/.m2/repository/it/nordcom/turni-cloner/1.0.0-SNAPSHOT
#            - cp common-library/turni-cloner/target/turni-cloner-1.0.0-SNAPSHOT.jar $HOME/.m2/repository/it/nordcom/turni-cloner/1.0.0-SNAPSHOT/turni-cloner-1.0.0-SNAPSHOT.jar
