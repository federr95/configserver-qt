spring.application.name=configserver-qt
server.port=8888
spring.profiles.active=native
spring.profiles.group.integration-test=native


############################################
#  ACTUATOR
############################################
# publish health indicator
management.endpoint.health.show-details=always
#add management logs with actuator
management.endpoint.loggers.enabled=true
#http trace response header
#management.trace.http.include=RESPONSE_HEADERS
management.httpexchanges.recording.include=RESPONSE_HEADERS
management.endpoint.httptrace.enabled=true
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=OPTIONS, GET, POST
management.endpoints.web.cors.allowed-headers=*

management.endpoint.health.probes.enabled=true
management.health.readinessState.enabled=true
management.health.livenessState.enabled=true

management.endpoint.refresh.enabled=true
# enable httptrace logger
#including every endpoint for actuator
management.endpoints.web.exposure.include=env, health, configprops, health-path, info, loggers, loggers-name, threaddump, heapdump, metrics, scheduledtasks, refresh, beans
management.endpoint.env.show-values=ALWAYS
management.endpoint.configprops.show-values=ALWAYS
management.info.env.enabled=false
management.metrics.tags.application=${spring.application.name}

############################################
#        CONFIG-REPO                       #
############################################
spring.cloud.config.server.native.search-locations=file:///C:/config


############################################
#                  LOGGERS
############################################
logging.level.org.springframework.boot.actuate=DEBUG
logging.level.org.springframework.cloud.endpoint=INFO
logging.level.org.springframework.cloud.config.server=INFO
logging.level.org.springframework.core.io=DEBUG